<svg width="250" height="80" viewBox="0 0 250 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="jtGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007bff" />
      <stop offset="100%" stop-color="#00d4ff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Icon Part: Modernized Microchip from Original Concept -->
  <g transform="translate(10, 15)" filter="url(#glow)">
    <!-- Microchip Body -->
    <rect x="5" y="5" width="40" height="40" rx="4" fill="none" stroke="url(#jtGradient)" stroke-width="3" />
    <rect x="12" y="12" width="26" height="26" rx="2" fill="url(#jtGradient)" opacity="0.8" />
    
    <!-- Connector Pins -->
    <path d="M15 2 V5 M25 2 V5 M35 2 V5" stroke="url(#jtGradient)" stroke-width="2.5" stroke-linecap="round" />
    <path d="M15 45 V48 M25 45 V48 M35 45 V48" stroke="url(#jtGradient)" stroke-width="2.5" stroke-linecap="round" />
    <path d="M2 15 H5 M2 25 H5 M2 35 H5" stroke="url(#jtGradient)" stroke-width="2.5" stroke-linecap="round" />
    <path d="M45 15 H48 M45 25 H48 M45 35 H48" stroke="url(#jtGradient)" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- Center Detail -->
    <circle cx="25" cy="25" r="4" fill="#ffffff" />
  </g>
  
  <!-- Text Part -->
  <text x="75" y="52" font-family="'Plus Jakarta Sans', sans-serif, Arial" font-size="34" font-weight="800">
    <tspan fill="#FFFFFF">Jag</tspan><tspan fill="url(#jtGradient)">Techno</tspan>
  </text>
</svg>
